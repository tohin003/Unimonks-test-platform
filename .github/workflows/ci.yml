name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify code formatting & linting
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build Next.js app
        run: npm run build
        env:
          # Dummy values to allow build to pass without real secrets
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/dummy"
          DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/dummy"
          JWT_SECRET: "dummy_jwt_secret_for_ci_builds"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
